<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Rasterizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="controls">
      <input type="text" id="textInput" placeholder="Type your text..." value="HELLO">
      <input type="color" id="colorPicker" value="#ff6b35">
      <button id="downloadBtn">Download</button>
    </div>
    <div class="controls">
      <label>
        Letter Spacing: <span id="spacingValue">1.0</span>x
        <input type="range" id="letterSpacing" min="0.6" max="1.4" step="0.1" value="1.0">
      </label>
    </div>
    <div class="controls stroke-controls">
      <div class="stroke-group">
        <label>
          Stroke 1: <span id="thickness1Value">13</span>px
          <input type="range" id="thickness1" min="7" max="17" step="1" value="13">
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="custom1Toggle">
          Custom
        </label>
        <input type="color" id="color1Picker" value="#c95529" class="stroke-color hidden">
      </div>
      <div class="stroke-group">
        <label>
          Stroke 2: <span id="thickness2Value">11</span>px
          <input type="range" id="thickness2" min="7" max="20" step="1" value="11">
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="custom2Toggle">
          Custom
        </label>
        <input type="color" id="color2Picker" value="#ffffff" class="stroke-color hidden">
      </div>
      <div class="stroke-group">
        <label>
          Stroke 3: <span id="thickness3Value">8</span>px
          <input type="range" id="thickness3" min="3" max="20" step="1" value="8">
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="custom3Toggle">
          Custom
        </label>
        <input type="color" id="color3Picker" value="#ffb699" class="stroke-color hidden">
      </div>
    </div>
    <canvas id="canvas"></canvas>
  </div>
  <script src="script.js"></script>
</body>
</html>
