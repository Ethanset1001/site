<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>redirecting...</title>
  <meta name="robots" content="noindex" />
  <script>
    // take current path + query + hash and forward it into index.html as ?p=
    // works on github pages because 404.html is served for unknown routes
    (function () {
      var p = location.pathname + location.search + location.hash
      // keep your repo base path if you have one (project pages)
      // for custom domain user pages, this is fine as-is
      location.replace('/?p=' + encodeURIComponent(p))
    })()
  </script>
</head>
<body></body>
</html>
