<!-- 404.html (put in repo root next to index.html) -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>redirecting...</title>
  <meta name="robots" content="noindex" />
  <script>
    (function () {
      // send unknown routes to index.html with original path in ?p=
      var p = location.pathname + location.search + location.hash
      location.replace('/?p=' + encodeURIComponent(p))
    })()
  </script>
</head>
<body></body>
</html>
